{% extends "base.html" %}
{% block title %}Profile — jobsearch{% endblock %}
{% block content %}

<header class="page-head">
  <h1>Profile</h1>
  <span class="muted">Preloaded into every job's copy-paste panel; stored only in the local database.</span>
</header>

<form method="post" action="/profile" class="profile-form">
  {% for f in fields %}
  <label>
    <span>{{ f.field.replace('_',' ') }}</span>
    <input type="text" name="{{ f.field }}" value="{{ f.value }}">
  </label>
  {% endfor %}
  <button class="btn btn-primary">Save profile</button>
</form>

{% endblock %}
