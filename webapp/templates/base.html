<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}jobsearch{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v={{ css_v }}">
</head>
<body>
<nav class="topnav">
  <a class="brand" href="/">jobsearch</a>
  <a href="/?stack=to_apply">To apply <span class="pill">{{ counts.to_apply }}</span></a>
  <a href="/?stack=in_progress">In progress <span class="pill pill-amber">{{ counts.in_progress }}</span></a>
  <a href="/?stack=applied">Applied <span class="pill pill-green">{{ counts.applied }}</span></a>
  <a href="/prep">Prep <span class="pill pill-amber">{{ prep_counts.lessons_done }}/{{ prep_counts.lessons_total }}</span></a>
  <a href="/resume">Resume</a>
  <a href="/profile">Profile</a>
  <a href="/settings">Search config</a>
  <a href="/emails">Email</a>
  <form method="post" action="/ingest" class="nav-ingest">
    <button class="btn btn-ghost" title="Pull the latest pipeline report into the database">⟳ Ingest latest run</button>
  </form>
  <button class="btn btn-primary" id="run-pipeline" title="Fetch every board, score against your resume, and load the results">▶ Run pipeline</button>
</nav>
<section id="run-panel" hidden>
  <div class="run-panel-head">
    <strong id="run-status">Running pipeline…</strong>
    <button class="btn btn-ghost" id="run-hide">hide</button>
  </div>
  <pre id="run-log"></pre>
</section>
<main>
{% block content %}{% endblock %}
</main>
<script src="/static/app.js"></script>
</body>
</html>
