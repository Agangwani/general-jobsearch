name: Daily job search

on:
  schedule:
    # 11:23 UTC = 7:23am ET — report is ready before the workday starts.
    - cron: "23 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-job-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | awk '/^Version:/{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium for browser-scraped boards
        run: playwright install --with-deps chromium

      - name: Run tests
        run: pip install pytest && python -m pytest -q

      - name: Run daily job search
        run: python -m jobsearch run

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports data/seen_jobs.tsv
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily job report $(date -u +%F)"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-report
          path: reports/latest.*
