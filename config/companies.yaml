# Company registry for the daily NYC job search.
#
# Every enabled company below is always included in the daily run; the report
# sorts them by resume fit, it never drops them. FAANG companies are tagged
# `faang`; the NYC top-50 software employers are tagged `top50`.
#
# `ats` selects the fetcher (see jobsearch/fetchers/). Any extra keys on an
# entry (board, org, tenant, ...) are passed to that fetcher as params.
#
# Capital One is intentionally absent (current employer).

companies:
  # ---------------------------------------------------------------- FAANG ---
  - name: Meta
    tags: [faang, top50]
    ats: meta
    fallback: browser_meta
    careers_url: https://www.metacareers.com/jobs?offices[0]=New%20York%2C%20NY

  - name: Apple
    tags: [faang, top50]
    ats: apple
    fallback: browser_apple
    careers_url: https://jobs.apple.com/en-us/search?location=new-york-city-NYC

  - name: Amazon
    tags: [faang, top50]
    ats: amazon
    careers_url: https://www.amazon.jobs/en/search?base_query=senior+software+engineer&loc_query=New+York%2C+NY

  - name: Netflix
    tags: [faang, top50]
    ats: eightfold
