# Companies whose career sites have no stable public API and cannot be
# responsibly scraped. The report links them in a "check manually" section so
# they are never silently forgotten.
manual_check:
  - name: LinkedIn  # aggressive bot protection; scraping violates LinkedIn ToS
    careers_url: https://careers.linkedin.com/jobs?location=New%20York

  - name: Bloomberg  # PerimeterX bot defense bounces both plain HTTP and the
                     # headless browser off careers.bloomberg.com (run
                     # diagnostics 2026-06-12) — check by hand instead
    careers_url: https://careers.bloomberg.com/job/search?ftsearch=software+engineer&location=New+York

  - name: Vimeo  # Greenhouse board closed; no stable public API currently
    careers_url: https://vimeo.com/careers

  - name: Hinge  # uses Match Group custom portal; no stable public Greenhouse/Lever board
    careers_url: https://hinge.co/careers

  - name: Two Sigma  # custom careers portal (careers.twosigma.com); Greenhouse board twosigma is inactive
    careers_url: https://careers.twosigma.com/careers/OpenRoles
