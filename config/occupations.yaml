# Occupation taxonomy for resume → role-profile matching (role_profile.py).
#
# A distilled, O*NET-shaped knowledge base: each entry is one occupation with
# the canonical job TITLES it goes by, a server-side search QUERY, the SKILLS
# that identify it, and the Muse job CATEGORIES it maps to. A resume is matched
# to its nearest occupation(s) here (TF-IDF or MiniLM cosine), and the matched
# entry becomes the search profile that drives the daily run — so the pipeline
# targets *the roles the resume is actually for*, not a hard-coded SWE filter.
#
# This file is a SEED covering the common role families. The full O*NET
# database (~900 occupations, ~56k alternate titles) can be distilled into this
# exact shape with tools/build_occupations.py — point it at an O*NET release to
# expand coverage. O*NET data is public domain (U.S. Dept. of Labor).
#
# Fields:
#   name        display name of the occupation
#   soc         O*NET-SOC code (reference only)
#   manage      true for management/leadership occupations — their generated
#               title filters do NOT exclude manager/director titles
#   titles      canonical + alternate titles; generated title_include patterns
#               are derived from these (seniority words stripped)
#   query       sent to boards that search server-side (Workday/Amazon/…) and
#               used as the Adzuna `what` term
#   skills      identifying skills/keywords — the bulk of the match signal, and
#               surfaced as the resume's "relevant skills"
#   categories  The Muse job categories used by company discovery

occupations:
