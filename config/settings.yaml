# Tuning knobs for the daily search. Everything here has a sensible default
# in code; this file just makes the defaults visible and editable.

resume: data/resume.txt

search:
  # Query sent to job boards that support server-side search (Workday,
  # Amazon, Google, Microsoft, ...). Board-dump APIs (Greenhouse, Lever,
  # Ashby) return everything and are filtered locally with the rules below.
  query: senior software engineer

  # A title must match at least one include pattern and no exclude pattern
  # (case-insensitive regex).
  # (senior|sr) — Pinterest and others abbreviate to "Sr." which `senior` alone
  # never matches; see docs/analysis-zero-match-companies.md.
  title_include:
    - '\b(senior|sr)\b.*\b(software|backend|back[- ]end|platform|infrastructure|full[- ]?stack|cloud|distributed|data|payments|fraud|machine learning|ml)\b.*\b(engineer|developer)\b'
    - '\b(senior|sr)\.? software development engineer\b'
    - '\bsoftware (development )?engineer\b.*\b(iii|iv|3|4|senior)\b'
    - '\bsde\s*(iii|3)\b'
    - '\bstaff\b.*\b(software|backend|platform|infrastructure)\b.*\bengineer\b'
    - '\b(lead|senior|sr)\b\.? (software|backend) (engineer|developer)\b'
  title_exclude:
    - '\b(intern|internship|co-?op|new grad|university|campus|apprentice)\b'
    - '\b(manager|director|vp|vice president|head of|principal|distinguished|fellow)\b'
    - '\b(ios|android|mobile|frontend|front[- ]end|salesforce developer|test|sdet|qa|quality|hardware|firmware|embedded|security clearance)\b'

  # A job location must contain one of these substrings (case-insensitive).
  locations:
    - new york
    - nyc
    - brooklyn
    - manhattan
  # Also accept US-remote roles from these companies (regardless of pay).
  include_remote: false
  # Carve-out (decided 2026-06-12): a US-remote role still enters the main
  # table when its posting shows a pay range topping out at/above this floor
  # (USD/year). Remote roles without a posted range, or below the floor, stay
  # in near-miss as REMOTE_NO_PAY_RANGE / REMOTE_PAY_BELOW_MIN. 0 disables.
  remote_min_pay: 200000
  # Decided 2026-06-12: titles with no level (Stripe, OpenAI, Jane Street…)
  # are promoted to the main table when the description requires 5+ years
  # and the title looks like a software role.
  promote_unleveled: true

ranking:
  # Final ordering = fit_score * 0.5 ** (age_days / half_life_days), so a
  # posting loses half its weight every `half_life_days` — this is what
  # "prioritize recently added" means concretely.
  half_life_days: 7
  # Age assumed for postings whose board exposes no date.
  unknown_age_days: 14
  # Ignore postings older than this entirely (days). 0 disables the cutoff.
  max_age_days: 45
  # K-means cluster count; "auto" picks ~1 cluster per 150 corpus postings,
  # capped at 20. Clustering runs on the FULL fetched corpus, not the filtered
  # survivors (docs/analysis-scoring-skew.md).
  clusters: auto
  # Weight of the cluster-affinity term in fit (rest is direct resume cosine).
  cluster_weight: 0.15
  # How many ranked jobs to include in the report.
  top_jobs: 100
  # How many near-miss (broadened-search) jobs to show.
  near_miss_count: 20
  # Company fit = mean fit of its top-N matching postings.
  company_top_n: 3

# Dynamic company discovery (`python -m jobsearch discover-companies`):
# mine generalized job boards for companies hiring people like you, rank them
# by resume fit, resolve their ATS boards, and write a generated registry that
# is merged on top of config/companies.yaml on every run.
discovery:
  # Lead sources (jobsearch/sources/). themuse and hn_hiring are keyless;
  # adzuna needs ADZUNA_APP_ID / ADZUNA_APP_KEY (free at developer.adzuna.com)
  # and is skipped cleanly without them.
  sources: [themuse, hn_hiring, adzuna]
  # Canonical location string sent to aggregator APIs (Muse `location`,
  # Adzuna `where`). Postings are still filtered against search.locations.
  location: New York, NY
  # How many new companies one discovery run may add to the registry.
  max_companies: 25
  # Aggregator pages fetched per source (and per Muse category).
  max_pages: 8
  # Muse job categories. Empty = inferred from the resume + search.query
  # (e.g. a data-science resume yields [Data Science, Software Engineering]).
  categories: []
  # Companies never auto-added — your current employer belongs here. This
  # also blocks stale generated files from re-adding them at load time.
  exclude_companies:
    - Capital One   # repo owner's current employer (see README)
  # Where the generated registry lands (gitignored: it derives from your
  # resume). Delete the file to fall back to the curated registry alone.
  output_file: data/companies.discovered.yaml

fetch:
  timeout_seconds: 30
  # Per-page timeout for browser-scraped boards (headless Chromium).
  browser_timeout_seconds: 45
  max_workers: 8
  # Cap on postings pulled per company before filtering (board dumps can be huge).
  max_per_company: 1500
  # Cap on per-job detail requests (Workday/SmartRecruiters-style boards).
  max_detail_requests: 40

output:
  reports_dir: reports
  state_file: data/seen_jobs.tsv
  # Full fetched corpus snapshots (gitignored) for offline scoring experiments.
  corpus_dir: data/corpus
  corpus_retention_days: 14
